services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: condimentos_abby
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "cd backend && npm install && npm start"
    environment:
      - NODE_ENV=production
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
      - DB_HOST=postgres
      - DB_NAME=condimentos_abby
      - DB_PORT=5432
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "80:4173"
    command: sh -c "cd frontend && npm install && npm run build && npm run preview -- --host"
    depends_on:
      - backend

volumes:
  postgres_data:
